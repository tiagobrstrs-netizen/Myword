<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Monde 🌍</title>

  <!-- FAVICON : l'icône dans l'onglet du navigateur -->

  <!-- Pour changer l'icône : remplace l'emoji 🌍 par un autre emoji -->

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />

  <!-- Mapbox GL JS : la vraie carte du monde interactive -->

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <!-- Mapbox Geocoder : le plugin barre de recherche -->

  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" />
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

  <!-- Notre style CSS personnalisé -->

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== BARRE DU HAUT ===== -->

  <header id="topbar">
    <div id="topbar-left">
      <span id="site-title">🌍 Mon Monde</span>
    </div>
    <div id="topbar-right">
      <!-- Bouton mode sombre -->
      <button id="btn-dark" onclick="toggleDark()" title="Mode sombre">🌙</button>
      <!-- Bouton liste des lieux -->
      <button id="btn-fav" onclick="togglePanel()">❤️ Mes lieux</button>
    </div>
  </header>

  <!-- ===== LA CARTE (prend tout l'écran) ===== -->

  <div id="map"></div>

  <!-- ===== PANNEAU LISTE DES LIEUX (s'ouvre à droite) ===== -->

  <div id="panel" class="hidden">
    <div id="panel-top">
      <h2>❤️ Mes lieux</h2>
      <button onclick="togglePanel()">✕</button>
    </div>
    <!-- La liste sera remplie automatiquement par JavaScript -->
    <div id="fav-list"></div>
  </div>

  <!-- ===== POPUP "Ajouter ce lieu ?" (apparaît quand on clique sur la carte) ===== -->

  <div id="popup-add" class="hidden">
    <p>📍 Que veux-tu faire ici ?</p>
    <div class="popup-btns">
      <button class="btn-cancel" onclick="closePopup()">Annuler</button>
      <button class="btn-ok" onclick="openForm()">✚ Ajouter ce lieu</button>
    </div>
  </div>

  <!-- ===== FORMULAIRE : remplir les infos du lieu ===== -->

  <div id="form-overlay" class="hidden">
    <div id="form-card">
      <h3>✨ Nouveau lieu</h3>

```
  <label>📌 Nom du lieu</label>
  <input type="text" id="inp-name" placeholder="Ex : Tour Eiffel, Ma plage…" />

  <label>🎵 Chanson associée</label>
  <input type="text" id="inp-song" placeholder="Ex : La Vie en Rose – Édith Piaf" />

  <label>📸 Photos (optionnel)</label>
  <input type="file" id="inp-photos" accept="image/*" multiple onchange="previewPhotos()" />

  <!-- Aperçu des photos sélectionnées -->
  <div id="photos-preview"></div>

  <div class="form-btns">
    <button class="btn-cancel" onclick="closeForm()">Annuler</button>
    <button class="btn-ok" onclick="savePlace()">💾 Enregistrer</button>
  </div>
</div>
```

  </div>

  <!-- ===== MODAL : voir un lieu enregistré ===== -->

  <div id="modal" class="hidden">
    <div id="modal-card">
      <button id="modal-close" onclick="closeModal()">✕</button>
      <h3 id="modal-name"></h3>
      <p id="modal-song"></p>
      <div id="modal-photos"></div>
      <button class="btn-delete" onclick="deletePlace()">🗑️ Supprimer</button>
    </div>
  </div>

  <!-- Notre JavaScript -->

  <script src="script.js"></script>

</body>
</html>
